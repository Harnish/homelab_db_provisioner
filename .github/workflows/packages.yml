name: Build Packages

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set version
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0~snapshot.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          GOARCH: ${{ matrix.goarch }}
          GOOS: linux
          CGO_ENABLED: "0"
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          go build -a \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/homelab-db-provisioner_${GOARCH}" .

      - name: Install nfpm
        run: |
          curl -sSfL \
            https://github.com/goreleaser/nfpm/releases/download/v2.41.4/nfpm_2.41.4_Linux_x86_64.tar.gz \
            | tar -xz nfpm
          sudo mv nfpm /usr/local/bin/nfpm

      - name: Build DEB
        env:
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: nfpm package --packager deb --target dist/

      - name: Build RPM
        env:
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: nfpm package --packager rpm --target dist/

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.goarch }}
          path: |
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          generate_release_notes: true
