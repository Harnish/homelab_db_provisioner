name: Build Packages

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
        env:
          GOTOOLCHAIN: auto

      - name: Set version
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0~snapshot.${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binary
        env:
          GOARCH: ${{ matrix.goarch }}
          GOOS: linux
          CGO_ENABLED: "0"
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          go build -a \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/homelab-db-provisioner .

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3
          export PATH="$(go env GOPATH)/bin:$PATH"
          nfpm --version

      - name: Build DEB
        env:
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.ver.outputs.version }}
          ARCH: ${{ matrix.goarch }}
        run: nfpm package --packager deb --target dist/

      - name: Build RPM
        env:
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.ver.outputs.version }}
          ARCH: ${{ matrix.goarch == 'amd64' && 'x86_64' || 'aarch64' }}
        run: nfpm package --packager rpm --target dist/

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: packages-${{ matrix.goarch }}
          path: |
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all packages
        uses: actions/download-artifact@v8
        with:
          pattern: packages-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: dist/*
          generate_release_notes: true
